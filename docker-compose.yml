version: '3.8' # (Sau versiunea pe care o folosești)
services:
  nano-claw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nano-claw
    restart: unless-stopped
    volumes:
      - ./config.json:/root/.nano-claw/config.json:ro
      - ./data:/root/.nano-claw
      - ./crontab.txt:/var/spool/cron/crontabs/root
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    command: /bin/sh -c "crond -b && node dist/cli/index.js gateway"
