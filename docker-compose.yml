services:
  nano-claw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nano-claw
    restart: unless-stopped

    # Mount your config so you can edit it without rebuilding
    volumes:
      - ./config.json:/root/.nano-claw/config.json:ro
      # Persist memory, logs, and custom skills across restarts
      - nano-claw-data:/root/.nano-claw

    # Expose if gateway mode serves an HTTP/webhook endpoint
    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=production

    # Uncomment to run in interactive CLI agent mode instead:
    command: ["node", "dist/cli/index.js", "gateway"]

volumes:
  nano-claw-data:
